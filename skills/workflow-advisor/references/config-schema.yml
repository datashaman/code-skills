# workflow-advisor config schema
#
# This file is the canonical schema for `.workflow/config.yml` in a user's repo.
# It is annotated with comments explaining each section and acceptable values.
# The actual user config is generated by the progressive interview, with most
# fields filled in or omitted (defaults apply).
#
# Schema version is tracked separately in `.workflow/schema_version` (a plain
# integer). Migrations live in scripts/migrations/.

schema_version: 1

# ---------------------------------------------------------------------------
# Repo-level identification
# ---------------------------------------------------------------------------

repo:
  provider: github                # github only for v1
  identifier: marlin/yuvee-backend
  default_branch: main
  branch_model: trunk-based       # trunk-based | github-flow | gitflow | release-branches

# ---------------------------------------------------------------------------
# Profiles - which methodology dimensions are active
# ---------------------------------------------------------------------------
#
# Each profile contributes artifacts, gates, labels, roles, slash commands,
# and lifecycle stages. Profiles compose; the active lifecycle is rendered
# from enabled profiles. See references/profiles/ for what each profile adds.
#
# Defaults: spec-driven, testability, observability ON. Documentation,
# security, accessibility, compliance OFF (prompted during interview).

profiles:
  spec-driven:    { enabled: true }
  testability:    { enabled: true }
  observability:  { enabled: true }
  documentation:  { enabled: false }
  security:       { enabled: false }
  accessibility:  { enabled: false }
  compliance:     { enabled: false }

# ---------------------------------------------------------------------------
# Lifecycle composition
# ---------------------------------------------------------------------------
#
# The composed sequence of stages, generated from enabled profiles' contributions.
# Sequential stages are listed in order; parallel stages are wrapped in a list.
# Computed by helpers/lifecycle.py at config-write time and on profile changes.
# Users can override via config to reorder or parallelize differently.

lifecycle:
  composition:
    sequence:
      - spec
      - arch-review
      - [impl-plan, test-plan, obs-plan]   # parallel
      - implementation
      - review
      - merge-ready
      - released                            # observability profile only
      - validated                           # observability profile only

  # Stage-level gates. A stage cannot be entered until the gates of the
  # previous stage(s) are satisfied. Gate names are defined by profiles.
  gates:
    spec:
      - spec_drafted
    arch-review:
      condition: type in [feature, breaking]
      gates: [spec_approved_by_architect]
      else: stage_advance_no_gate
    impl-plan:
      - impl_plan_drafted
    test-plan:
      - test_plan_drafted
    obs-plan:
      - obs_plan_drafted_if_required
    implementation:
      - impl_plan_approved
      - test_plan_approved
      - obs_plan_approved_if_required
    review:
      - tests_pass
      - coverage_threshold_met
    merge-ready:
      - min_approvals_met
      - codeowners_approved
      - no_unresolved_review_threads
      - no_open_blockers
      - instrumentation_present_if_required
    released:
      - deployed
      - baseline_metrics_captured
    validated:
      - post_release_metrics_reviewed
      - validation_window_elapsed

  # When gates fail, what happens between in-flight stages and dependent items.
  # See references/cascade.md for full semantics.
  cascade:
    spec_substantive_change:
      impl_plan: revert_to_draft
      test_plan: revert_to_draft
      obs_plan: revert_to_draft
      threat_model: revert_to_draft
      open_prs: revert_to_arch_review
      related_adrs: flag_for_review
    spec_editorial_change:
      impl_plan: no_change
      test_plan: no_change
      obs_plan: no_change
      threat_model: no_change
      open_prs: notify_only
      related_adrs: no_change
    spec_supersession:
      impl_plan: archive
      test_plan: archive
      obs_plan: archive
      threat_model: archive
      open_prs: link_to_new_spec_and_notify
      related_adrs: append_supersession_note
    preserve_in_flight: true   # default; label-and-notify before reverting

# ---------------------------------------------------------------------------
# Roles
# ---------------------------------------------------------------------------
#
# Roles are how the skill routes review, notification, and approval. Every
# member is either a github handle or an external contact. External members
# are mentioned in comments by name; github members are @-mentioned.
#
# A single person can hold multiple roles (common on small teams). Empty
# required roles cause profile gates to route to tech_lead with a
# `needs:role-assignment:{role}` flag rather than silently skipping review.

roles:
  # Delivery roles
  spec_author:
    description: Anyone who drafts a spec
    members: any                       # `any` = open to all repo members
  architect:
    description: Approves specs, defines interfaces, reviews arch changes
    members:
      - { type: github, handle: marlin }
  tech_lead:
    description: Approves implementation plans, signs off breaking changes
    members:
      - { type: github, handle: marlin }
  reviewer:
    description: General code review
    members:
      - { type: github, handle: alice }
      - { type: github, handle: bob }
  maintainer:
    description: Releases, merges to main
    members:
      - { type: github, handle: marlin }
  test_lead:
    description: Approves test plans, signs off test evidence
    members:
      - { type: github, handle: marlin }
  sre:
    description: Approves observability plans, validates instrumentation, owns alerts
    members: []                        # empty - gates route to tech_lead
  security:
    description: Approves threat models, signs off security reviews
    members: []
  accessibility_lead:
    description: Approves a11y plans, validates evidence
    members: []

  # Audience roles (consume docs, approve their audience's content)
  support:
    description: Customer support and troubleshooting
    members: []
  product:
    description: Feature positioning, release communications
    members: []
  end_user_advocate:
    description: User-facing documentation
    members: []
  legal_compliance:
    description: Compliance assessments and attestations (compliance profile)
    members: []
  auditor:
    description: Read-only audit access (compliance profile)
    access_mode: read_only
    members: []

  # Aliasing - team-specific names mapped to canonical roles
  aliases:
    design_lead: architect
    qa_lead: test_lead
    devops: sre

# ---------------------------------------------------------------------------
# Approvals and review policy
# ---------------------------------------------------------------------------

review_policy:
  min_approvals: 1
  codeowners_required: true
  dismiss_stale_reviews_on_push: false
  require_resolved_threads_to_merge: true

# ---------------------------------------------------------------------------
# Artifacts
# ---------------------------------------------------------------------------
#
# Per-artifact-type configuration. Most fields are inherited from profile
# defaults (in references/profiles/) and only overridden here when the team
# customizes. Sidecar files in `.workflow/artifacts/{type}/` mirror state.

artifacts:
  spec:
    enabled: true                                    # from spec-driven profile
    required_for: [feature, breaking, api_change]
    template: .workflow/templates/spec.md
    lives_in: docs/specs/
    sidecar: .workflow/artifacts/specs/
    approval_required_from: [architect]
    front_matter_sync: true

  adr:
    enabled: true
    required_for: [architectural_decision, breaking]
    template: .workflow/templates/adr.md
    lives_in: docs/adr/
    sidecar: .workflow/artifacts/adrs/
    approval_required_from: [architect, tech_lead]

  impl_plan:
    enabled: true
    required_for: [feature, breaking]
    template: .workflow/templates/impl-plan.md
    lives_in: docs/impl-plans/
    sidecar: .workflow/artifacts/impl-plans/
    approval_required_from: [tech_lead]

  test_plan:
    enabled: true                                    # from testability profile
    required_for: [feature, breaking]
    template: .workflow/templates/test-plan.md
    lives_in: docs/test-plans/
    sidecar: .workflow/artifacts/test-plans/
    approval_required_from: [test_lead]

  obs_plan:
    enabled: true                                    # from observability profile
    required_for: [feature, breaking]
    template: .workflow/templates/obs-plan.md
    lives_in: docs/observability/
    sidecar: .workflow/artifacts/obs-plans/
    approval_required_from: [sre]

# ---------------------------------------------------------------------------
# Profile-specific configuration
# ---------------------------------------------------------------------------
# Only the testability, observability sections are shown here. See
# references/profiles/{name}.md for full profile schemas.

testability:
  levels:
    unit:        required
    integration: required
    contract:    required_for: [api_change, breaking]
    e2e:         required_for: [feature, breaking]
    performance: required_for: [breaking, performance_sensitive]
    security:    required_for: [auth, payments, pii]
  thresholds:
    coverage:
      lines: 80
      branches: 70
      enforcement: warn   # warn | block

observability:
  signals:
    logs:    required
    metrics: required
    traces:  required_for: [feature, performance_sensitive]
    events:  required_for: [user_facing, async_workflow]
    alerts:  required_for: [feature, breaking]
  post_release:
    validation_window_days: 7
    require_metrics_review: true
    require_runbook_dry_run: optional

# ---------------------------------------------------------------------------
# Classification triggers
# ---------------------------------------------------------------------------
#
# Auto-classify PRs/issues based on file paths and diff content. Reduces
# "we forgot to flag this for security/a11y review" failures.

classification:
  type_triggers:
    feature:
      keywords_in_title: [feat, feature, add, implement]
      branch_prefixes: [feat/, feature/]
    bugfix:
      keywords_in_title: [fix, bug, hotfix]
      branch_prefixes: [fix/, bugfix/, hotfix/]
    breaking:
      keywords_in_title: [breaking, "BREAKING:"]
      labels: [breaking-change]
    docs:
      paths: [docs/**, "*.md", README*]
      branch_prefixes: [docs/]
    refactor:
      keywords_in_title: [refactor, cleanup, rename]
      branch_prefixes: [refactor/]

  area_triggers:
    auth:
      paths: [src/auth/**, "**/auth.*", "**/login.*"]
    payments:
      paths: [src/payments/**, src/billing/**]
    pii:
      paths: [src/users/**, src/profiles/**]
      keywords_in_diff: [email, phone, address, ssn]
    ui:
      paths: ["**/*.tsx", "**/*.jsx", "**/*.vue", "src/components/**"]
    infrastructure:
      paths: [terraform/**, k8s/**, ".github/workflows/**", Dockerfile*]
    api:
      paths: [src/api/**, openapi.yml, "**/routes.*"]

# ---------------------------------------------------------------------------
# Labels
# ---------------------------------------------------------------------------
#
# The taxonomy is mostly determined by enabled profiles. Aliases let teams
# use their existing labels while the skill treats them as canonical.

labels:
  prefix_separator: ":"
  aliases:
    bug:           type:bugfix
    enhancement:   type:feature
    documentation: type:docs

# ---------------------------------------------------------------------------
# Slash command authorization
# ---------------------------------------------------------------------------
#
# Each command has a list of roles authorized to invoke it. Unauthorized
# attempts get a comment explaining why and which roles can. See
# references/vocabulary/commands.md for the full command list.

slash_commands:
  approve-spec:           [architect]
  request-arch-review:    any
  sign-off:               [tech_lead, maintainer]
  reclassify:             [architect, spec_author]
  supersede:              [spec_author]
  override-gate:          per_gate_override_policy
  skip-stage:             [tech_lead, maintainer]
  approve-test-plan:      [test_lead]
  sign-off-tests:         [test_lead, tech_lead]
  approve-obs-plan:       [sre]
  sign-off-instrumentation: [sre]
  post-release-validated: [sre]
  rollback-release:       [sre, maintainer]

# ---------------------------------------------------------------------------
# AI usage policy
# ---------------------------------------------------------------------------
#
# Bounds where the skill spends API calls. Mechanical-first defaults keep
# cost low; only ambiguous cases escalate to LLM judgment.

ai_usage:
  classification:           mechanical_first_then_llm   # mechanical_first_then_llm | always | mechanical_only
  comment_drafting:         llm                         # llm | template
  gate_evaluation:          llm_for_subjective          # llm_for_subjective | deterministic_only
  spec_amendment_classify:  always_llm                  # this judgment matters; don't shortcut

# ---------------------------------------------------------------------------
# Transport - how events reach the skill
# ---------------------------------------------------------------------------
#
# Only one mode is active. Bootstrap selects this based on the user's
# answers; switching modes is supported via config change. See
# references/transports/ for per-mode setup details.

transport:
  mode: github_actions   # github_actions | gh_forward | self_hosted_webhook | github_app | polling | on_demand_only

  github_actions:
    workflow_file: .github/workflows/workflow-advisor.yml
    schedule_cron: "0 2 * * *"
    concurrency_group: workflow-advisor-${repo}
    runs_on: ubuntu-latest

# ---------------------------------------------------------------------------
# Provider actions - how queued GitHub mutations are handled
# ---------------------------------------------------------------------------
#
# Folder reconciliation always happens first. Provider actions are queued as
# explicit records, then handled by this policy.

provider_actions:
  mode: queue   # queue | dry_run | apply

# ---------------------------------------------------------------------------
# Observability and reporting
# ---------------------------------------------------------------------------

observability_reports:
  decisions_log:
    commit: false                # gitignored by default; team opt-in
  metrics_events:
    commit: false                # raw event stream gitignored by default
  reports:
    commit: true                 # rolled-up reports committable (aggregated)
    actor_attribution: roles     # roles | names | hybrid

# ---------------------------------------------------------------------------
# Archive policy
# ---------------------------------------------------------------------------

archive:
  retention: forever             # forever | days:N
  migration_threshold:
    files: 500
    size_mb: 50
  on_threshold: prompt           # prompt | auto-migrate | ignore
  migration_target: docs/process-history/
